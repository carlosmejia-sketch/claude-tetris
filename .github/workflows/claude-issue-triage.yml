name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    # Evita doble ejecución con claude.yml (que corre cuando el issue menciona @claude)
    if: ${{ !contains(github.event.issue.body, '@claude') && !contains(github.event.issue.title, '@claude') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # necesario para crear/aplicar labels y comentar
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Eres un asistente de triage para el repositorio ${{ github.repository }}
            (un juego de Tetris en JavaScript vanilla: game.js, index.html, style.css).

            Analiza el issue #${{ github.event.issue.number }} y realiza el triage.
            Trabaja en español y de forma concisa.

            Pasos:

            1. Lee el issue con: gh issue view ${{ github.event.issue.number }}

            2. Asegura la taxonomía de labels. Usa `gh label list` y crea con
               `gh label create` SOLO los que falten (nombre, --color y --description):
               - Tipo:      bug, enhancement, question, documentation
               - Área:      area:rendering, area:gameplay, area:scoring, area:controls, area:ui
               - Prioridad: priority:high, priority:medium, priority:low
               Ejemplo: gh label create "area:rendering" --color "1D76DB" --description "Dibujo en canvas / render"

            3. Elige los labels adecuados y aplícalos con:
               gh issue edit ${{ github.event.issue.number }} --add-label "<labels separados por coma>"
               Reglas: exactamente 1 label de Tipo; opcionalmente 1 de Área; opcionalmente 1 de Prioridad.
               Si el issue ya tiene labels, solo añade los que falten (no dupliques).

            4. Revisa el código relevante (game.js, index.html, style.css) con Read/Grep
               para fundamentar el diagnóstico con referencias concretas.

            5. Publica UN comentario con:
               gh issue comment ${{ github.event.issue.number }} --body "<contenido>"
               El comentario debe incluir estas secciones en Markdown:
               - **Resumen**: el problema o solicitud en 1-2 frases.
               - **Causa probable / análisis**: qué está ocurriendo y por qué.
               - **Áreas y archivos afectados**: con referencias tipo `game.js:línea` cuando aplique.
               - **Pasos sugeridos**: lista accionable para implementar la solución.
               - **Labels asignados**: los que aplicaste.

            No edites el cuerpo del issue. No abras PRs. Limítate al triage descrito.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*),Read,Grep,Glob"'
