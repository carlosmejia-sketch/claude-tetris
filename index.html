<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <div class="skin-control">
        <label class="skin-label" for="skin-select">Skin</label>
        <select id="skin-select" class="skin-select">
          <option value="retro">Retro</option>
          <option value="neon">Neón</option>
          <option value="pastel">Pastel</option>
          <option value="pixel">Pixel</option>
        </select>
      </div>
      <h1 class="game-title">TETRIS</h1>
      <div class="theme-control">
        <span class="theme-label" id="theme-label">Tema</span>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          role="switch"
          aria-checked="false"
          aria-labelledby="theme-label"
          aria-label="Cambiar a modo claro"
        >
          <span class="theme-toggle-thumb"></span>
        </button>
      </div>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
            <li>💣 bomba: destruye 3×3</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box" id="gameover-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>

      <div class="overlay-box pause-menu hidden" id="pause-menu">
        <p class="pause-title">PAUSA</p>
        <button id="resume-btn" type="button">Reanudar</button>
        <button id="pause-restart-btn" type="button">Reiniciar</button>
        <div class="level-select">
          <label for="start-level">Nivel inicial</label>
          <select id="start-level">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
        <button id="toggle-controls-btn" type="button">Ver controles</button>
        <ul id="pause-controls" class="pause-controls hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          <li>💣 bomba: destruye 3×3</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
