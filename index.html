<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>
      <div class="theme-control">
        <span class="theme-label" id="theme-label">Tema</span>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          role="switch"
          aria-checked="false"
          aria-labelledby="theme-label"
          aria-label="Cambiar a modo claro"
        >
          <span class="theme-toggle-thumb"></span>
        </button>
      </div>
    </div>
    <div class="game-container">
      <aside class="panel side-panel">
        <div class="panel-section">
          <span class="label">RECORDS</span>
          <div id="side-records" class="records-block"></div>
        </div>
      </aside>

      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
            <li>💣 bomba: destruye 3×3</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title">PAUSA</p>
      </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title gameover-title">GAME OVER</p>
        <p id="gameover-score" class="overlay-score"></p>
        <div id="name-entry" class="name-entry hidden">
          <label class="name-prompt" for="name-input">¡Entraste al top! Tu nombre:</label>
          <div class="name-row">
            <input id="name-input" type="text" maxlength="12" placeholder="Jugador" autocomplete="off" />
            <button id="save-record-btn">Guardar</button>
          </div>
        </div>
        <div id="gameover-records" class="records-block"></div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title start-title">TETRIS</p>
        <div id="start-records" class="records-block"></div>
        <div class="start-buttons">
          <button id="play-btn">Jugar</button>
          <button id="reset-records-btn" class="btn-secondary">Resetear records</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
